name: Checks

on:
  push:
    branches:
      - master
      - develop
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      PRE_COMMIT_HOME: /tmp/pre-commit-cache

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Install packaging tools
        run: python -m pip install --upgrade build

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Run Ruff lint
        run: python -m ruff check .

      - name: Run Ruff formatter check
        run: python -m ruff format --check .

      - name: Run ASCII-only check
        run: python scripts/check_ascii.py

      - name: Check generated grammar diagrams
        run: python scripts/generate_grammar_diagrams.py --check

      - name: Check release version metadata
        run: python scripts/check_release_version.py --skip-index-check

      - name: Run unit tests
        run: python -m pytest -q tests

      - name: Build source and wheel distributions
        run: python -m build --sdist --wheel
