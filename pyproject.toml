[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nex"
version = "0.1.0"

[project.optional-dependencies]
dev = ["pytest>=8"]

[project.scripts]
nex = "nex.cli:main"

[tool.setuptools.packages.find]
include = ["nex", "nex.*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
