repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff-check
        entry: python -m ruff check
        language: system
        types_or: [python]

      - id: ruff-format
        name: ruff-format
        entry: python -m ruff format --check
        language: system
        types_or: [python]

      - id: ascii-text-files
        name: ascii-text-files
        entry: python scripts/check_ascii.py
        language: system
        pass_filenames: false
